<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Eisenhower" />
  <title>Task Eisenhower</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <h1 id="app-name">GÖREV MATRİSİ</h1>
    <div class="lang-switcher">
      <button id="lang-tr" onclick="setLang('tr')">TR</button>
      <button id="lang-en" onclick="setLang('en')">EN</button>
      <button id="lang-it" onclick="setLang('it')">IT</button>
    </div>
  </header>

  <div class="matrix">
    <div class="quadrant q-do">
      <div class="quadrant-header" id="sub-do">ACİL & ÖNEMLİ</div>
      <div class="quadrant-title" id="label-do">Hemen Yap</div>
      <div class="quadrant-tasks" id="tasks-do"></div>
    </div>

    <div class="quadrant q-schedule">
      <div class="quadrant-header" id="sub-schedule">ÖNEMLİ, ACİL DEĞİL</div>
      <div class="quadrant-title" id="label-schedule">Planla</div>
      <div class="quadrant-tasks" id="tasks-schedule"></div>
    </div>

    <div class="quadrant q-delegate">
      <div class="quadrant-header" id="sub-delegate">ACİL, ÖNEMLİ DEĞİL</div>
      <div class="quadrant-title" id="label-delegate">Delege Et</div>
      <div class="quadrant-tasks" id="tasks-delegate"></div>
    </div>

    <div class="quadrant q-eliminate">
      <div class="quadrant-header" id="sub-eliminate">NE ACİL NE ÖNEMLİ</div>
      <div class="quadrant-title" id="label-eliminate">Yapma / Sil</div>
      <div class="quadrant-tasks" id="tasks-eliminate"></div>
    </div>
  </div>

  <div class="task-pool">
    <div class="task-pool-header">
      <h2 id="pool-title">GÖREV HAVUZU</h2>
      <button class="btn-add" id="btn-add" onclick="openAddModal()">+ Görev Ekle</button>
    </div>

    <table class="task-table">
      <thead>
        <tr>
          <th style="width: 50px;">No</th>
          <th id="th-name">Görev Adı</th>
          <th id="th-date">Tarih</th>
          <th id="th-category">Kategori</th>
          <th id="th-status">Durum</th>
          <th id="th-notes">Notlar</th>
        </tr>
      </thead>
      <tbody id="task-tbody"></tbody>
    </table>

    <div class="archive-toggle" id="archive-toggle" onclick="toggleArchive()">Arşivi Göster</div>
  </div>

  <div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3 id="modal-title">Yeni Görev</h3>
      <input type="text" id="task-name-input" placeholder="Görev adını girin..." />
      <select id="task-category-input">
        <option value="do">DO - Hemen Yap</option>
        <option value="schedule">SCHEDULE - Planla</option>
        <option value="delegate">DELEGATE - Delege Et</option>
        <option value="eliminate">ELIMINATE - Yapma</option>
      </select>
      <select id="task-status-input">
        <option value="beklemede">🟡 Beklemede</option>
        <option value="devam">🔵 Devam Ediyor</option>
        <option value="delege">🟠 Delege Edildi</option>
        <option value="geri">🔴 Geri Döndü</option>
        <option value="tamamlandi">✅ Tamamlandı</option>
      </select>
      <textarea id="task-notes-input" placeholder="Notlar..."></textarea>
      <div class="modal-buttons">
        <button class="btn-cancel" id="btn-cancel" onclick="closeModal()">İptal</button>
        <button class="btn-save" id="btn-save" onclick="saveModal()">Kaydet</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
