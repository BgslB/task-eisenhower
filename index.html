<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Eisenhower PRO</title>
  <link rel="stylesheet" href="style.css?v=v5_final" />
</head>
<body>

  <header class="header">
    <h1 id="app-name">GÖREV MATRİSİ</h1>
    <div class="header-right">
      <button class="btn-export" onclick="downloadTasks()">💾 Yedekle</button>
      <div class="lang-switcher">
        <button id="lang-tr" onclick="setLang('tr')">TR</button>
        <button id="lang-en" onclick="setLang('en')">EN</button>
        <button id="lang-it" onclick="setLang('it')">IT</button>
      </div>
    </div>
  </header>

  <div class="matrix">
    <div class="quadrant q-do" ondrop="drop(event, 'do')" ondragover="allowDrop(event)">
      <div class="quadrant-header" id="sub-do">ACİL & ÖNEMLİ</div>
      <div class="quadrant-title" id="label-do">Hemen Yap</div>
      <div class="quadrant-tasks" id="tasks-do"></div>
    </div>
    <div class="quadrant q-schedule" ondrop="drop(event, 'schedule')" ondragover="allowDrop(event)">
      <div class="quadrant-header" id="sub-schedule">ÖNEMLİ, ACİL DEĞİL</div>
      <div class="quadrant-title" id="label-schedule">Planla</div>
      <div class="quadrant-tasks" id="tasks-schedule"></div>
    </div>
    <div class="quadrant q-delegate" ondrop="drop(event, 'delegate')" ondragover="allowDrop(event)">
      <div class="quadrant-header" id="sub-delegate">ACİL, ÖNEMLİ DEĞİL</div>
      <div class="quadrant-title" id="label-delegate">Delege Et</div>
      <div class="quadrant-tasks" id="tasks-delegate"></div>
    </div>
    <div class="quadrant q-eliminate" ondrop="drop(event, 'eliminate')" ondragover="allowDrop(event)">
      <div class="quadrant-header" id="sub-eliminate">NE ACİL NE ÖNEMLİ</div>
      <div class="quadrant-title" id="label-eliminate">Yapma / Sil</div>
      <div class="quadrant-tasks" id="tasks-eliminate"></div>
    </div>
  </div>

  <div class="task-pool">
    <div class="task-pool-header">
      <h2 id="pool-title">GÖREV HAVUZU</h2>
      <button class="btn-add" id="btn-add" onclick="openAddModal()">+ Görev Ekle</button>
    </div>
    <table class="task-table">
      <thead>
        <tr>
          <th style="width: 50px;">Ver.</th>
          <th id="th-name">Görev</th>
          <th id="th-created">Giriş</th>
          <th id="th-deadline">Bitiş</th>
          <th id="th-status">Durum/Kime</th>
          <th id="th-notes">Notlar</th>
        </tr>
      </thead>
      <tbody id="task-tbody"></tbody>
    </table>
    <div class="archive-toggle" id="archive-toggle" onclick="toggleArchive()">Arşivi Göster</div>
  </div>

  <footer class="footer">
    <p>In onore di <em>Onur Safi</em>, con profondo rispetto.</p>
    <p class="signature">Sviluppato da <strong>BgslB</strong></p>
  </footer>

  <div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h3 id="modal-title">Görev Detayı</h3>
      <input type="text" id="task-name-input" placeholder="Görev adı..." />
      
      <div class="modal-row">
        <select id="task-category-input" onchange="updateCategoryUI()"></select>
        <select id="task-status-input" onchange="updateStatusUI()"></select>
      </div>

      <div id="delegate-to-wrapper" style="display:none">
        <input type="text" id="task-delegate-input" placeholder="Kime delege edildi?" />
      </div>

      <div class="modal-row" id="date-edit-wrapper" style="display:none">
        <div class="date-group">
          <label>Giriş:</label>
          <input type="date" id="task-start-input" />
        </div>
        <div class="date-group">
          <label>Bitiş:</label>
          <input type="date" id="task-deadline-input" />
        </div>
      </div>

      <textarea id="task-notes-input" placeholder="Detaylar..."></textarea>

      <div id="modal-history" class="modal-history"></div>

      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeModal()">İptal</button>
        <button class="btn-save" onclick="saveModal()">Kaydet</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=v5_final"></script>
</body>
</html>
